<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="Favicon.png" />
        <title>Weather App</title>
        <link href="style.css" rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <div class="card" style="width: 18rem">
            <img
                src="CardImage.jpg"
                class="card-img-top"
                alt="..."
                height="150rem"
            />
            <div class="card-body">
                <h5 class="card-title" id="wSituations">Weather</h5>
                <p class="card-text" id="wDescription">
                    "Description about Weather"
                </p>
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item" id="wTemp">Temp:</li>
                <li class="list-group-item" id="wPressure">Pressure:</li>
                <li class="list-group-item" id="wHumidity">Humidity:</li>
                <li class="list-group-item" id="wWind">Wind Speed:</li>
                <li class="list-group-item" id="wProvinceName">
                    ProvinceName:
                </li>
            </ul>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="app.js"></script>
    </body>
</html>
